name: Docker image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/onlinejudgebo/patito-ide

jobs:
  docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_JUDGE_API_URL=${{ vars.ADMIN_API_PUBLIC_URL || 'http://localhost:8088/api' }}
            NEXT_PUBLIC_JUDGE_WS_URL=${{ vars.ADMIN_API_PUBLIC_WS_URL || 'ws://localhost:8088/api' }}
            NEXT_PUBLIC_VIBE_IDE_CONTEXT_URL=${{ vars.VIBE_IDE_CONTEXT_URL || 'http://localhost:8088/api/vibe/context' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
